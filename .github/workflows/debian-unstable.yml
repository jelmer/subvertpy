name: debian-unstable-build
on: [push, pull_request]
jobs:
  build:
    name: subvertpy build on Debian unstable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout subvertpy code
        uses: actions/checkout@v6
      - name: Build subvertpy on Debian unstable
        uses: vjik/docker-run@v1
        with:
          image: debian:unstable
          volumes: ${{ github.workspace }}:/subvertpy:rw
          workdir: /subvertpy
          command: |
            apt update
            apt install -y python3 libpython3-dev python3-venv \
              build-essential libsvn-dev cargo pkg-config libclang-dev \
              libutf8proc-dev subversion

            # Work around https://bugs.debian.org/1055242
            svnversion=$(svn --version | grep -oP 'svn, version \K\d+\.\d+\.\d+')
            echo "Detected svn version: $svnversion"
            sed -i "s/^Version: *$/Version: $svnversion/" /usr/lib/*/pkgconfig/libsvn_*.pc
            grep "^Version:" /usr/lib/*/pkgconfig/libsvn_client*.pc

            python3 -m venv ~/venv
            . ~/venv/bin/activate

            pip install setuptools-rust
            pip install .
